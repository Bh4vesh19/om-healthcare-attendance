<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login | OM Health Care</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/jpeg" href="./assets/logo.jpeg"/>
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#0D1117"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="OM Attendance"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <link rel="manifest" href="./manifest.json"/>
  <link rel="apple-touch-icon" href="./assets/logo.jpeg"/>

  <!-- Firebase SDK (v8) — same as all other pages -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  
  <style>
    .login-card {
        width: 100%;
        max-width: 420px;
        padding: 2.5rem 2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
    }
    
    .logo-frame {
        width: 108px;
        height: 108px;
        border-radius: 24px;
        border: 2px solid var(--border);
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-primary);
        box-shadow: 0 14px 40px rgba(210, 153, 34, 0.18);
    }
    
    .logo-frame img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .msg {
        font-size: 13px;
        text-align: center;
        min-height: 20px;
        margin-top: -0.5rem;
    }
    .msg.error { color: var(--accent-red); }
    .msg.success { color: var(--accent-green); }

    .back-link {
        color: var(--text-secondary);
        font-size: 0.85rem;
        text-decoration: none;
        margin-top: 0.5rem;
        transition: color 0.2s;
    }
    .back-link:hover { color: var(--text-primary); }
  </style>
</head>
<body style="display: flex; align-items: center; justify-content: center; padding: 1rem; min-height: 100vh; background: var(--bg-primary);">
  
  <div class="glass-card login-card">
    <div class="logo-frame">
      <img src="./assets/logo.jpeg" alt="OM Health Care" style="width:100%;height:100%;object-fit:cover;" />
    </div>
    
    <div style="text-align: center;">
        <h1 style="font-size: 1.8rem; margin-bottom: 0.5rem; color: var(--accent-amber);">Admin Portal</h1>
        <p style="color: var(--text-secondary); font-size: 0.9rem;">OM Health Care — Secure Login</p>
    </div>

    <form style="width: 100%; display: flex; flex-direction: column; gap: 1.5rem;">
      <div class="form-group" style="margin-bottom: 0;">
        <label>Access Password</label>
        <input type="password" id="passwordInput" placeholder="Enter your password" required autocapitalize="off" autocorrect="off" />
      </div>

      <div class="msg" id="msg"></div>

      <button type="button" id="loginBtn" class="btn btn-gold btn-unlocked" style="width: 100%;" onclick="doLogin()">AUTHORIZE</button>
    </form>

    <a href="./index.html" class="back-link">← Back to selection</a>
  </div>

  <script>
    async function doLogin() {
      const password = document.getElementById('passwordInput').value.trim();
      const btn = document.getElementById('loginBtn');
      const msg = document.getElementById('msg');
      
      if (!password) {
        msg.className = 'msg error';
        msg.textContent = 'Please enter your password.';
        return;
      }
      
      btn.disabled = true;
      btn.textContent = 'Verifying...';
      msg.className = 'msg';
      msg.textContent = '';
      
      try {
        // Use shared auth from firebase-config.js (v8 compat)
        await auth.signInWithEmailAndPassword(window.ADMIN_EMAIL, password);
        
        // Use safe storage helpers from auth.js
        safeSetSession('adminSession', { loggedIn: true, role: 'admin', email: window.ADMIN_EMAIL, timestamp: Date.now() });
        safeSetItem('loginDate', window.getCurrentDate());
        
        msg.className = 'msg success';
        msg.textContent = '✓ Login successful! Redirecting...';
        
        setTimeout(() => { window.location.assign('./admin-dashboard.html'); }, 800);
      } catch(err) {
        msg.className = 'msg error';
        msg.textContent = 'Incorrect password. Please try again.';
        btn.disabled = false;
        btn.textContent = 'AUTHORIZE';
      }
    }
    
    document.getElementById('passwordInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin();
    });
  </script>

  <!-- SW Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js', { scope: './' })
          .then(() => console.log('SW registered'))
          .catch(e => console.log('SW failed:', e));
      });
    }
  </script>
</body>
</html>
