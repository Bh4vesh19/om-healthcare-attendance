<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login | OM Health Care</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/jpeg" href="./assets/logo.jpeg"/>
  
  <style>
    .login-card {
        width: 100%;
        max-width: 420px;
        padding: 2.5rem 2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
    }
    
    .logo-frame {
        width: 108px;
        height: 108px;
        border-radius: 24px;
        border: 2px solid var(--border);
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-primary);
        box-shadow: 0 14px 40px rgba(210, 153, 34, 0.18);
    }
    
    .logo-frame img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .msg {
        font-size: 13px;
        text-align: center;
        min-height: 20px;
        margin-top: -0.5rem;
    }
    .msg.error { color: var(--accent-red); }
    .msg.success { color: var(--accent-green); }

    .back-link {
        color: var(--text-secondary);
        font-size: 0.85rem;
        text-decoration: none;
        margin-top: 0.5rem;
        transition: color 0.2s;
    }
    .back-link:hover { color: var(--text-primary); }
  </style>
</head>
<body style="display: flex; align-items: center; justify-content: center; padding: 1rem; min-height: 100vh; background: var(--bg-primary);">
  
  <div class="glass-card login-card">
    <div class="logo-frame">
      <img src="./assets/logo.jpeg" alt="OM Health Care" style="width:100%;height:100%;object-fit:cover;" />
    </div>
    
    <div style="text-align: center;">
        <h1 style="font-size: 1.8rem; margin-bottom: 0.5rem; color: var(--accent-amber);">Admin Portal</h1>
        <p style="color: var(--text-secondary); font-size: 0.9rem;">OM Health Care — Secure Login</p>
    </div>

    <form style="width: 100%; display: flex; flex-direction: column; gap: 1.5rem;">
      <div class="form-group" style="margin-bottom: 0;">
        <label>Access Password</label>
        <input type="password" id="passwordInput" placeholder="Enter your password" required />
      </div>

      <div class="msg" id="msg"></div>

      <button type="button" id="loginBtn" class="btn btn-gold btn-unlocked" style="width: 100%;" onclick="doLogin()">AUTHORIZE</button>
    </form>

    <a href="index.html" class="back-link">← Back to selection</a>
  </div>

  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDU78Ze7rpB3r-0W_MhqfQS2Y0QqodgraY",
  authDomain: "store-attendance-system.firebaseapp.com",
  projectId: "store-attendance-system",
  storageBucket: "store-attendance-system.firebasestorage.app",
  messagingSenderId: "601354333815",
  appId: "1:601354333815:web:0512759b171e27d4462072"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.doLogin = async function() {
  const password = document.getElementById('passwordInput').value.trim();
  const btn = document.getElementById('loginBtn');
  const msg = document.getElementById('msg');
  if (!password) { msg.className='msg error'; msg.textContent='Please enter your password.'; return; }
  btn.disabled = true;
  btn.textContent = 'Verifying...';
  msg.className = 'msg';
  msg.textContent = '';
  try {
    await signInWithEmailAndPassword(auth, "omheathcare24@gmail.com", password);
    sessionStorage.setItem('omhc_session', JSON.stringify({ loggedIn: true, role: 'admin' }));
    msg.className = 'msg success';
    msg.textContent = '✓ Login successful! Redirecting...';
    setTimeout(() => { window.location.href = 'admin-dashboard.html'; }, 1000);
  } catch(err) {
    msg.className = 'msg error';
    msg.textContent = 'Incorrect password. Please try again.';
    btn.disabled = false;
    btn.textContent = 'AUTHORIZE';
  }
};

document.getElementById('passwordInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') window.doLogin();
});
</script>
</body>
</html>
