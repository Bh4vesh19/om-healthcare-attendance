<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OM Health Care | Attendance Portal</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/jpeg" href="./assets/logo.jpeg"/>
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0D1117"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="OM Attendance"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <link rel="manifest" href="./manifest.json"/>
    <link rel="apple-touch-icon" href="./assets/logo.jpeg"/>
    
    <!-- Firebase SDK (v8) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="js/firebase-config.js"></script>
    
    <style>
        .entry-card {
            width: 100%;
            max-width: 480px;
            padding: 3rem 2rem;
            text-align: center;
        }
        
        .logo-glow {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            margin: 0 auto 2rem;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 0 30px rgba(210, 153, 34, 0.2);
        }
        
        .logo-glow img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .portal-options {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            margin-top: 2.5rem;
        }

        .portal-btn {
            height: 60px;
            font-size: 1rem;
            letter-spacing: 1px;
            justify-content: center;
        }
    </style>
</head>
<body style="display: flex; align-items: center; justify-content: center; padding: 1.5rem;">
    
    <div class="glass-card entry-card">
        <div class="logo-glow">
            <img src="./assets/logo.jpeg" alt="OM Health Care" style="width:100%;height:100%;object-fit:cover;" />
        </div>
        
        <h1 style="font-size: 2rem; color: var(--accent-amber); margin-bottom: 0.5rem; letter-spacing: 1px;">OM HEALTH CARE</h1>
        <p style="color: var(--text-secondary); font-size: 0.95rem;">Attendance Management & Staff Portal</p>

        <div class="portal-options">
            <a href="./staff-login.html" class="btn btn-primary portal-btn" style="background: var(--accent-blue); color: #fff;">
                STAFF ACCESS PORTAL
            </a>
            <a href="./admin-login.html" class="btn btn-ghost portal-btn">
                ADMINISTRATOR LOGIN
            </a>
            <button id="installAppBtn" class="btn btn-gold portal-btn" style="display:none; background: var(--accent-amber); color: #000;">
                INSTALL APP
            </button>
        </div>

        <div style="margin-top: 4rem; color: var(--text-secondary); font-size: 0.8rem; opacity: 0.6;">
            &copy; 2026 OM Health Care. All rights reserved.
        </div>
    </div>

    <script>
        // Use early auth check to redirect if already logged in
        auth.onAuthStateChanged(user => {
            if (user) {
                const sessionStr = sessionStorage.getItem('omhc_session') || sessionStorage.getItem('staffSession');
                if (sessionStr) {
                    const session = JSON.parse(sessionStr);
                    if (session.role === 'admin') window.location.href = './admin-dashboard.html';
                    else if (session.role === 'staff') window.location.href = './staff-dashboard.html';
                }
            }
        });

        // PWA Install Logic
        let deferredInstallPrompt = null;
        const installBtn = document.getElementById('installAppBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredInstallPrompt = e;
            if (installBtn) installBtn.style.display = 'inline-flex';
        });

        if (installBtn) {
            installBtn.addEventListener('click', async () => {
                if (!deferredInstallPrompt) return;
                deferredInstallPrompt.prompt();
                await deferredInstallPrompt.userChoice;
                deferredInstallPrompt = null;
                installBtn.style.display = 'none';
            });
        }

        // SW Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js', { scope: './' })
                    .then(() => {})
                    .catch(e => {});
            });
        }
    </script>
</body>
</html>
