<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login | OM Health Care</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/jpeg" href="./assets/logo.jpeg"/>
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1e252c"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="OM Attendance"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <link rel="manifest" href="./manifest.json"/>
    <link rel="apple-touch-icon" href="./assets/logo.jpeg"/>
    <!-- Firebase SDK (v8) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
</head>
<body style="display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at top, #1a1a1f, #0a0a0c);">
    
    <div class="glass-card animate" style="width: 100%; max-width: 420px; padding: 3rem;">
        <div style="margin-bottom: 2.5rem; text-align: center;">
            <img 
              src="./assets/logo.jpeg"
              alt="OM Health Care"
              onerror="this.src=LOGO_DATA"
              style="width:80px; height:80px; 
                     object-fit:cover; 
                     border-radius:16px;
                     display:block;
                     margin:0 auto 1rem;"
            />
          
            <h1 style="color: var(--primary);">Staff Access</h1>
            <p class="subtitle">Enter your credentials to mark attendance</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" id="staffName" placeholder="e.g. Bhavesh" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 1rem;">SIGN IN</button>
        </form>

        <a href="./index.html" style="display: block; text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.85rem; text-decoration: none;">&larr; Back to selection</a>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('staffName').value;
            const password = document.getElementById('password').value;
            loginStaff(name, password);
        });
    </script>
    <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {        navigator.serviceWorker.register('./sw.js')
          .then(() => console.log('SW registered'))
          .catch(e => console.log('SW failed:', e));
      });
    }
    </script>
</body>
</html>
